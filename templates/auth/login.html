{% extends "base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center">

    <div class="bg-gray-900 p-8 rounded-xl w-full max-w-md shadow-lg">

        <h2 class="text-3xl font-bold text-center mb-6 text-cyan-400">
            Login
        </h2>

        {% if error %}
            <div class="bg-red-500/20 text-red-400 p-3 rounded mb-4 text-sm">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
                class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700 focus:outline-none">

            <input type="password" name="password" placeholder="Password"
                class="w-full p-3 mb-2 rounded bg-gray-800 border border-gray-700 focus:outline-none">

            <div class="text-right mb-4">
                <a href="/password-reset/" class="text-sm text-cyan-400 hover:underline">
                    Forgot Password?
                </a>
            </div>

            <button type="submit"
                class="w-full bg-cyan-400 text-black py-3 rounded font-bold hover:bg-cyan-300">
                Login
            </button>

        </form>

        <p class="text-center text-gray-400 mt-4">
            Don't have an account?
            <a href="/register/" class="text-yellow-400">Register</a>
        </p>

    </div>

</div>

{% endblock %}
