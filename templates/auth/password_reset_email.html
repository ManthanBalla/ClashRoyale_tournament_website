<!doctype html>
<html>
<body style="margin:0;padding:0;background:#0b0a10;font-family:Arial,sans-serif;color:#f4f4f5;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#14111a;border:1px solid #2b2230;border-radius:14px;overflow:hidden;">
          <tr>
            <td style="padding:22px 20px;border-bottom:1px solid #2b2230;">
              <h1 style="margin:0;font-size:22px;line-height:1.3;color:#ffffff;">Reset your password</h1>
              <p style="margin:8px 0 0;font-size:13px;color:#b9b4c7;">Clash Arena account security</p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px;">
              <p style="margin:0 0 10px;font-size:14px;color:#efeef3;">Hi {{ user.get_username }},</p>
              <p style="margin:0 0 18px;font-size:14px;color:#cfcad9;">
                We received a request to change your password. Click the button below to continue.
              </p>
              <p style="margin:0 0 18px;">
                <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
                   style="display:inline-block;padding:12px 20px;background:#ff4d5e;color:#ffffff;text-decoration:none;border-radius:999px;font-weight:700;">
                  Click here to change password
                </a>
              </p>
              <p style="margin:0;font-size:12px;color:#9e97b0;">
                If you did not request this, you can ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
