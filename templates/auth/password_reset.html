{% extends "base.html" %}

{% block content %}

<div class="flex justify-center items-center min-h-screen">

    <form method="POST" class="bg-gray-900 p-8 rounded-xl w-full max-w-md shadow-lg">
        {% csrf_token %}

        <h2 class="text-2xl text-cyan-400 mb-6 text-center">
            Reset Password
        </h2>

        <input type="email" name="email" placeholder="Enter your email"
               class="w-full p-3 mb-4 bg-gray-800 border border-gray-700 rounded focus:outline-none">

        <button type="submit"
                class="w-full bg-cyan-400 text-black py-3 rounded font-bold hover:bg-cyan-300">
            Send Reset Link
        </button>
    </form>

</div>

{% endblock %}
