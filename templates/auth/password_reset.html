{% extends "base.html" %}

{% block content %}

<div class="flex justify-center items-center min-h-[60vh] px-3 py-10">

    <form method="POST" class="ca-glass p-6 sm:p-8 w-full max-w-md">
        {% csrf_token %}

        <h2 class="text-xl sm:text-2xl text-white mb-2 text-center font-extrabold tracking-tight">
            Reset password
        </h2>
        <p class="ca-muted text-sm text-center mb-6">We will email you a reset link</p>

        <label class="ca-label text-xs font-medium mb-1.5 block">Email</label>
        <input type="email" name="email" placeholder="you@email.com" required class="ca-input mb-5">

        <button type="submit" class="ca-btn w-full">
            Send reset link
        </button>
    </form>

</div>

{% endblock %}
