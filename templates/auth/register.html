{% extends "base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center">

    <div class="bg-gray-900 p-8 rounded-xl w-full max-w-md shadow-lg">

        <h2 class="text-3xl font-bold text-center mb-6 text-green-400">
            Register
        </h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
                class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700">

            <input type="email" name="email" placeholder="Email"
                class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700">

            <input type="password" name="password" placeholder="Password"
                class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700">

            <button type="submit"
                class="w-full bg-green-400 text-black py-3 rounded font-bold hover:bg-green-300">
                Register
            </button>

        </form>

        <p class="text-center text-gray-400 mt-4">
            Already have an account?
            <a href="/login" class="text-yellow-400">Login</a>
        </p>

    </div>

</div>

{% endblock %}
