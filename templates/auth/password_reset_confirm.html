{% extends "base.html" %}

{% block content %}

<div class="flex justify-center items-center min-h-screen">

    <form method="POST" class="bg-gray-900 p-8 rounded-xl w-full max-w-md shadow-lg">
        {% csrf_token %}

        <h2 class="text-2xl text-green-400 mb-6 text-center">
            Set New Password
        </h2>

        {{ form.new_password1 }}
        {{ form.new_password2 }}

        <button type="submit"
                class="w-full mt-4 bg-green-400 text-black py-3 rounded font-bold hover:bg-green-300">
            Reset Password
        </button>
    </form>

</div>

{% endblock %}
