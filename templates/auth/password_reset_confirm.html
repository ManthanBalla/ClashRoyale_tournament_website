{% extends "base.html" %}

{% block content %}

<style>
    .pwd-reset-form input[type="password"] {
        width: 100%;
        min-height: 2.75rem;
        padding: 0.625rem 1rem;
        margin-bottom: 0.75rem;
        border-radius: 0.875rem;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 1rem;
    }
    .pwd-reset-form input[type="password"]:focus {
        outline: none;
        border-color: rgba(255, 77, 94, 0.55);
        box-shadow: 0 0 0 3px rgba(255, 77, 94, 0.15);
    }
    .pwd-reset-form ul.errorlist { color: #fecaca; font-size: 0.875rem; margin-bottom: 0.75rem; text-align: left; }
    .pwd-reset-form .helptext { color: rgba(255,255,255,0.45); font-size: 0.75rem; display: block; margin-bottom: 1rem; }
</style>

<div class="flex justify-center items-center min-h-[60vh] px-3 py-10">

    <form method="POST" class="ca-glass p-6 sm:p-8 w-full max-w-md pwd-reset-form">
        {% csrf_token %}

        <h2 class="text-xl sm:text-2xl text-white mb-2 text-center font-extrabold tracking-tight">
            New password
        </h2>
        <p class="ca-muted text-sm text-center mb-6">Choose a strong password</p>

        {{ form.new_password1 }}
        {{ form.new_password2 }}

        <button type="submit" class="ca-btn w-full mt-2">
            Update password
        </button>
    </form>

</div>

{% endblock %}
