{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center py-8 px-4">
    <form method="POST" action="/cups/{{ cup.id }}/edit/" id="editCupForm"
          class="ca-glass p-6 w-full max-w-lg mx-auto">
        {% csrf_token %}

        <h2 class="text-2xl text-white mb-2 text-center font-extrabold tracking-tight">✏️ Edit Cup</h2>
        <p class="text-gray-400 text-sm text-center mb-6">Update your cup details</p>

        <!-- BASIC INFO -->
        <p class="text-gray-500 text-xs uppercase tracking-widest mb-3">🏆 Cup Info</p>

        <label class="text-gray-400 text-sm mb-1 block">Cup Name *</label>
        <input type="text" name="name" value="{{ cup.name }}" required
               class="w-full p-2.5 mb-3 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-ca-accent text-white text-sm">

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
                <label class="text-gray-400 text-sm mb-1 block">Prize Pool (₹) *</label>
                <input type="number" name="prize_pool" value="{{ cup.prize_pool }}" min="0" required
                       class="w-full p-2.5 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-yellow-400 text-white text-sm">
            </div>
            <div>
                <label class="text-gray-400 text-sm mb-1 block">Max Players *</label>
                <input type="number" name="max_players" value="{{ cup.max_players }}" min="2" required
                       class="w-full p-2.5 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-ca-accent text-white text-sm">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
                <label class="text-gray-400 text-sm mb-1 block">Min Trophies</label>
                <input type="number" name="min_trophies" value="{{ cup.min_trophies }}" min="0"
                       class="w-full p-2.5 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-ca-accent text-white text-sm">
            </div>
            <div>
                <label class="text-gray-400 text-sm mb-1 block">Reward Type</label>
                <select name="reward_type"
                        class="w-full p-2.5 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-ca-accent text-white text-sm">
                    <option value="cash" {% if cup.reward_type == 'cash' %}selected{% endif %}>💵 Cash</option>
                    <option value="gift_card" {% if cup.reward_type == 'gift_card' %}selected{% endif %}>🎁 Gift Card</option>
                </select>
            </div>
        </div>

        <label class="text-gray-400 text-sm mb-1 block">Eligibility Criteria</label>
        <input type="text" name="eligibility_criteria" value="{{ cup.eligibility_criteria }}"
               class="w-full p-2.5 mb-3 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-ca-accent text-white text-sm">

        <label class="text-gray-400 text-sm mb-1 block">Rules *</label>
        <textarea name="rules" rows="4" required
                  class="w-full p-2.5 mb-4 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-ca-accent text-white text-sm resize-none">{{ cup.rules }}</textarea>

        <!-- SCHEDULE -->
        <p class="text-gray-500 text-xs uppercase tracking-widest mb-3">📅 Schedule</p>

        <label class="text-gray-400 text-sm mb-1 block">Time Zone</label>
        <div class="grid grid-cols-2 gap-3 mb-3">
            <label class="cursor-pointer">
                <input type="radio" name="timezone_choice" value="IST" checked class="hidden" id="tzIST" onchange="switchTZ('IST')">
                <div id="labelIST" class="border-2 border-ca-accent bg-ca-accent/10 rounded-xl p-3 text-center transition cursor-pointer">
                    <p class="text-ca-accent font-bold text-sm">🇮🇳 IST</p>
                    <p class="text-gray-400 text-xs">India Standard Time</p>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="radio" name="timezone_choice" value="UTC" class="hidden" id="tzUTC" onchange="switchTZ('UTC')">
                <div id="labelUTC" class="border-2 border-gray-700 bg-gray-800 rounded-xl p-3 text-center transition cursor-pointer">
                    <p class="text-gray-400 font-bold text-sm">🌍 UTC</p>
                    <p class="text-gray-500 text-xs">Universal Time</p>
                </div>
            </label>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
                <label class="text-gray-400 text-sm mb-1 block">Start Time *</label>
                <input type="datetime-local" name="start_time" required
                       value="{{ cup.start_time|date:'Y-m-d' }}T{{ cup.start_time|date:'H:i' }}"
                       class="w-full p-2.5 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-ca-accent text-white text-sm">
            </div>
            <div>
                <label class="text-gray-400 text-sm mb-1 block">End Time *</label>
                <input type="datetime-local" name="end_time" required
                       value="{{ cup.end_time|date:'Y-m-d' }}T{{ cup.end_time|date:'H:i' }}"
                       class="w-full p-2.5 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-red-400 text-white text-sm">
            </div>
        </div>

        <!-- JOIN GUIDE -->
        <p class="text-gray-500 text-xs uppercase tracking-widest mb-3">📖 Join Guide</p>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
                <label class="text-gray-400 text-sm mb-1 block">Clan Name</label>
                <input type="text" name="clan_name" value="{{ guide.clan_name|default:'' }}"
                       class="w-full p-2.5 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-ca-accent text-white text-sm">
            </div>
            <div>
                <label class="text-gray-400 text-sm mb-1 block">Clan Tag</label>
                <input type="text" name="clan_tag" value="{{ guide.clan_tag|default:'' }}"
                       class="w-full p-2.5 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-ca-accent text-white text-sm">
            </div>
        </div>

        <label class="text-gray-400 text-sm mb-1 block">Join Instructions</label>
        <textarea name="instructions" rows="3"
                  class="w-full p-2.5 mb-5 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-ca-accent text-white text-sm resize-none">{{ guide.instructions|default:'' }}</textarea>

        {% if cup.bracket_generated %}
        <div class="rounded-xl p-3 mb-4 border" style="background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.3);">
            <p class="text-red-400 text-xs">⚠️ Bracket has been generated. Some changes (player limits) may not affect existing matches.</p>
        </div>
        {% endif %}

        <div class="flex flex-col-reverse sm:flex-row gap-3">
            <a href="/cups/{{ cup.id }}/"
               class="ca-btn-outline flex-1 text-center min-h-[2.75rem] font-bold">
                Cancel
            </a>
            <button type="submit" class="ca-btn flex-1 min-h-[2.75rem]">
                💾 Save Changes
            </button>
        </div>
    </form>
</div>

<script>
function switchTZ(tz) {
    const labelIST = document.getElementById('labelIST');
    const labelUTC = document.getElementById('labelUTC');
    if (tz === 'IST') {
        labelIST.className = 'border-2 border-ca-accent bg-ca-accent/10 rounded-xl p-3 text-center transition cursor-pointer';
        labelIST.querySelector('p').className = 'text-ca-accent font-bold text-sm';
        labelUTC.className = 'border-2 border-gray-700 bg-gray-800 rounded-xl p-3 text-center transition cursor-pointer';
        labelUTC.querySelector('p').className = 'text-gray-400 font-bold text-sm';
    } else {
        labelUTC.className = 'border-2 border-ca-accent bg-ca-accent/10 rounded-xl p-3 text-center transition cursor-pointer';
        labelUTC.querySelector('p').className = 'text-ca-accent font-bold text-sm';
        labelIST.className = 'border-2 border-gray-700 bg-gray-800 rounded-xl p-3 text-center transition cursor-pointer';
        labelIST.querySelector('p').className = 'text-gray-400 font-bold text-sm';
    }
}
</script>
{% endblock %}
